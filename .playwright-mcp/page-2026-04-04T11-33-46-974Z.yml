              - heading "Real-time event notification mechanism." [level=5] [ref=e5222]
              - paragraph [ref=e5223]: After a purchase of the number, there is no need to repeatedly request activation status to receive incoming SMS messages. The service sends SMS content to the specified HTTPS URLs using the POST method.
              - paragraph [ref=e5224]: Up to 3 webhook URLs can be supported simultaneously. URLs are specified in the accounts personal information. Each webhook call is performed independently for each specified URL.
              - list [ref=e5225]:
                - listitem [ref=e5226]: "Method: POST"
                - listitem [ref=e5227]: "Content-Type: application/json"
                - listitem [ref=e5228]: "Response timeout: 3 seconds"
                - listitem [ref=e5229]:
                  - text: "If there is no response with code 200, the call is considered unsuccessful:"
                  - list [ref=e5230]:
                    - listitem [ref=e5231]: Number of retries - 7 times at least
                    - listitem [ref=e5232]: Delay between retries - 20–30 seconds
                    - listitem [ref=e5233]: Total duration of attempts - 3 minutes at least
