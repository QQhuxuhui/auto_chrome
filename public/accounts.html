<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>账号管理 — Gemini Family Pipeline</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="/public/css/app.css">
</head>
<body class="p-6">
<nav class="mb-6 flex gap-3 items-center">
    <span class="text-lg font-semibold">Gemini Family Pipeline</span>
    <div class="flex-1"></div>
    <a href="/" class="px-3 py-1 rounded hover:bg-slate-800">仪表盘</a>
    <a href="/accounts" class="px-3 py-1 rounded hover:bg-slate-800 font-medium">账号管理</a>
    <a href="/runs" class="px-3 py-1 rounded hover:bg-slate-800">运行历史</a>
</nav>

<main x-data="accounts()" x-init="load()" class="space-y-4">
    <!-- Migration banner -->
    <div x-show="migrate && (migrate.hosts?.shouldImport || migrate.members?.shouldImport)"
         class="card p-4 border-amber-500/50 bg-amber-950/30">
        🔔 检测到本地 txt 文件 &nbsp;(hosts: <span x-text="migrate?.hosts?.fileCount ?? 0"></span>,
        members: <span x-text="migrate?.members?.fileCount ?? 0"></span>)
        <button @click="doImport()" class="ml-3 px-3 py-1 bg-amber-700 hover:bg-amber-600 rounded">从 txt 导入</button>
    </div>

    <div class="flex gap-2 border-b border-slate-700">
        <button @click="switchTab('hosts')" :class="tab==='hosts' ? 'text-white font-semibold border-b-2 border-emerald-500' : 'text-slate-400'" class="px-4 py-2">母号</button>
        <button @click="switchTab('members')" :class="tab==='members' ? 'text-white font-semibold border-b-2 border-emerald-500' : 'text-slate-400'" class="px-4 py-2">子号</button>
        <button @click="switchTab('archived')" :class="tab==='archived' ? 'text-white font-semibold border-b-2 border-emerald-500' : 'text-slate-400'" class="px-4 py-2">
            已废弃<span class="ml-1 text-xs text-slate-500" x-text="archivedCount ? `(${archivedCount})` : ''"></span>
        </button>
    </div>

    <!-- Hosts tab -->
    <section x-show="tab==='hosts'">
        <div class="flex gap-2 mb-3">
            <button @click="openBulk='hosts'" class="px-3 py-1 bg-slate-700 rounded">+ 批量导入</button>
            <input x-model="hostSearch" @input.debounce.300ms="loadHosts()" placeholder="搜索 email"
                   class="px-3 py-1 bg-slate-800 rounded flex-1">
        </div>
        <table class="data card">
            <thead><tr>
                <th>邮箱</th>
                <th>密码</th>
                <th>辅助邮箱</th>
                <th>FA 验证码</th>
                <th>占用</th>
                <th>已停用</th>
                <th>操作</th>
            </tr></thead>
            <tbody>
                <template x-for="h in hosts" :key="h.id">
                    <tr>
                        <td class="mono" x-text="h.email"></td>
                        <td>
                            <template x-if="h.password">
                                <span>
                                    <span class="mono" x-text="revealed['host-'+h.id] ? h.password : '••••••'"></span>
                                    <button @click="toggleReveal('host', h.id)" class="ml-1 text-xs text-blue-400"
                                            x-text="revealed['host-'+h.id] ? '隐' : '显'"></button>
                                    <button @click="copyCred(h.password)" class="ml-1 text-xs text-blue-400">复制</button>
                                </span>
                            </template>
                            <template x-if="!h.password"><span>—</span></template>
                        </td>
                        <td class="mono text-xs">
                            <template x-if="h.recovery_email">
                                <span>
                                    <span x-text="h.recovery_email"></span>
                                    <button @click="copyCred(h.recovery_email)" class="ml-1 text-blue-400">复制</button>
                                </span>
                            </template>
                            <template x-if="!h.recovery_email"><span>—</span></template>
                        </td>
                        <td>
                            <template x-if="h.totp_secret">
                                <span>
                                    <span class="mono text-sm tracking-widest" x-text="(totpCache['host-'+h.id] || {}).code || '…'"></span>
                                    <span class="ml-1 text-xs text-slate-400" x-text="ttlFor('host-'+h.id) > 0 ? ttlFor('host-'+h.id)+'s' : ''"></span>
                                    <button @click="copyCred((totpCache['host-'+h.id] || {}).code)" class="ml-1 text-xs text-blue-400">复制</button>
                                </span>
                            </template>
                            <template x-if="!h.totp_secret"><span>—</span></template>
                        </td>
                        <td><span x-text="`${h.slot_used} / 5`"></span></td>
                        <td>
                            <input type="checkbox" :checked="h.disabled" @change="toggleDisabled(h)">
                        </td>
                        <td class="space-x-2 text-sm">
                            <template x-if="!activeLoginSessions[h.id]">
                                <button @click="loginHost(h)" class="text-emerald-400"
                                        title="打开 Chrome 登录并进入家庭成员页，手动关闭浏览器结束">登录</button>
                            </template>
                            <template x-if="activeLoginSessions[h.id]">
                                <span class="text-slate-500"
                                      :title="`已登录 pid=${activeLoginSessions[h.id]}，关浏览器后按钮恢复`">已登录</span>
                            </template>
                            <button @click="deleteHost(h)" class="text-red-400">删除</button>
                        </td>
                    </tr>
                </template>
                <tr x-show="!hosts.length"><td colspan="7" class="text-center text-slate-500 py-4">暂无母号</td></tr>
            </tbody>
        </table>
    </section>

    <!-- Members tab (active + archived share the same table) -->
    <section x-show="tab==='members' || tab==='archived'">
        <div class="flex gap-2 mb-3">
            <button x-show="tab==='members'" @click="openBulk='members'" class="px-3 py-1 bg-slate-700 rounded">+ 批量导入</button>
            <button x-show="tab==='members'" @click="pushAllPending()" class="px-3 py-1 bg-emerald-700 hover:bg-emerald-600 rounded">
                批量推送待推送（<span x-text="pendingPushCount"></span>）
            </button>
            <select x-show="tab==='members'" x-model="memberStatusFilter" @change="loadMembers()" class="px-2 py-1 bg-slate-800 rounded">
                <option value="">全部状态</option>
                <template x-for="s in ACTIVE_STATUSES" :key="s">
                    <option :value="s" x-text="statusLabel(s)"></option>
                </template>
            </select>
            <select x-show="tab==='archived'" x-model="memberStatusFilter" @change="loadMembers()" class="px-2 py-1 bg-slate-800 rounded">
                <option value="">全部已废弃</option>
                <template x-for="s in ARCHIVED_STATUSES" :key="s">
                    <option :value="s" x-text="statusLabel(s)"></option>
                </template>
            </select>
            <input x-model="memberSearch" @input.debounce.300ms="loadMembers()" placeholder="搜索 email"
                   class="px-3 py-1 bg-slate-800 rounded flex-1">
        </div>
        <table class="data card">
            <thead><tr>
                <th>邮箱</th>
                <th>密码</th>
                <th>辅助邮箱</th>
                <th>FA 验证码</th>
                <th>状态</th>
                <th>母号</th>
                <th>失败次数</th>
                <th>凭证</th>
                <th>平台状态</th>
                <th>操作</th>
            </tr></thead>
            <tbody>
                <template x-for="m in members" :key="m.id">
                    <tr>
                        <td class="mono" x-text="m.email"></td>
                        <td>
                            <template x-if="m.password">
                                <span>
                                    <span class="mono" x-text="revealed['member-'+m.id] ? m.password : '••••••'"></span>
                                    <button @click="toggleReveal('member', m.id)" class="ml-1 text-xs text-blue-400"
                                            x-text="revealed['member-'+m.id] ? '隐' : '显'"></button>
                                    <button @click="copyCred(m.password)" class="ml-1 text-xs text-blue-400">复制</button>
                                </span>
                            </template>
                            <template x-if="!m.password"><span>—</span></template>
                        </td>
                        <td class="mono text-xs">
                            <template x-if="m.recovery_email">
                                <span>
                                    <span x-text="m.recovery_email"></span>
                                    <button @click="copyCred(m.recovery_email)" class="ml-1 text-blue-400">复制</button>
                                </span>
                            </template>
                            <template x-if="!m.recovery_email"><span>—</span></template>
                        </td>
                        <td>
                            <template x-if="m.totp_secret">
                                <span>
                                    <span class="mono text-sm tracking-widest" x-text="(totpCache['member-'+m.id] || {}).code || '…'"></span>
                                    <span class="ml-1 text-xs text-slate-400" x-text="ttlFor('member-'+m.id) > 0 ? ttlFor('member-'+m.id)+'s' : ''"></span>
                                    <button @click="copyCred((totpCache['member-'+m.id] || {}).code)" class="ml-1 text-xs text-blue-400">复制</button>
                                </span>
                            </template>
                            <template x-if="!m.totp_secret"><span>—</span></template>
                        </td>
                        <td>
                            <select class="pill" :class="m.status"
                                    :value="m.status"
                                    @change="updateStatus(m, $event.target.value)"
                                    title="点击修改状态">
                                <template x-for="s in ALL_STATUSES" :key="s">
                                    <option :value="s" :selected="s === m.status" x-text="statusLabel(s)"></option>
                                </template>
                            </select>
                        </td>
                        <td class="mono text-xs">
                            <span x-text="m.host_id ? hostEmailById(m.host_id) : '—'"></span>
                        </td>
                        <td x-text="m.fail_count"></td>
                        <td>
                            <template x-if="m.token">
                                <span>
                                    <span class="mono text-xs" x-text="App.shortToken(m.token)"></span>
                                    <button @click="copyToken(m)" class="ml-1 text-xs text-blue-400">复制</button>
                                </span>
                            </template>
                            <template x-if="!m.token"><span>—</span></template>
                        </td>
                        <td>
                            <template x-if="!m.antigravity || !m.antigravity.id">
                                <template x-if="m.antigravity && m.antigravity.push_error">
                                    <span class="pill invite_failed" title="点击 操作 列的 推送 重试">❗ 推送失败</span>
                                </template>
                                <template x-if="!m.antigravity || !m.antigravity.push_error">
                                    <span class="pill new">— 未推送</span>
                                </template>
                            </template>
                            <template x-if="m.antigravity && m.antigravity.id">
                                <template x-if="m.antigravity.disabled">
                                    <span class="pill invite_failed"
                                          :title="m.antigravity.disabled_reason || ''">❌ 已封禁</span>
                                </template>
                                <template x-if="!m.antigravity.disabled && m.antigravity.is_forbidden">
                                    <span class="pill invite_failed"
                                          :title="m.antigravity.forbidden_reason || 'AI credits 耗尽'">❌ 配额封禁</span>
                                </template>
                                <template x-if="!m.antigravity.disabled && !m.antigravity.is_forbidden && m.antigravity.validation_blocked">
                                    <span class="pill oauth_failed">⚠️ 需验证</span>
                                </template>
                                <template x-if="!m.antigravity.disabled && !m.antigravity.is_forbidden && !m.antigravity.validation_blocked">
                                    <span class="pill done">✅ 正常</span>
                                </template>
                            </template>
                        </td>
                        <td class="space-x-2 text-sm">
                            <button @click="openDetail(m)" class="text-blue-400">详情</button>
                            <button @click="openEdit(m)" class="text-cyan-400">编辑</button>
                            <!-- 有凭证（refresh token）就显示推送按钮，不再受 status/disabled 约束。
                                 未推过 → "推送"；已推过 → "重推"（覆盖平台记录）。 -->
                            <template x-if="m.token && (!m.antigravity || !m.antigravity.id)">
                                <button @click="pushMember(m)" class="text-green-400">推送</button>
                            </template>
                            <template x-if="m.token && m.antigravity && m.antigravity.id">
                                <button @click="pushMember(m)" class="text-green-400"
                                        :title="m.antigravity.disabled ? '平台已封禁，重新推送' : '覆盖平台记录重新推送'">重推</button>
                            </template>
                            <button @click="clearFailCount(m)" class="text-lime-400" x-show="m.fail_count > 0"
                                    title="把失败次数清零，让 stage 2/3 能重新选到这个账号">清零</button>
                            <button @click="resetMember(m)" class="text-yellow-400">重置</button>
                            <button @click="abandonMember(m)" class="text-orange-400">放弃</button>
                            <button @click="deleteMember(m)" class="text-red-400">删除</button>
                        </td>
                    </tr>
                </template>
                <tr x-show="!members.length"><td colspan="10" class="text-center text-slate-500 py-4">暂无子号</td></tr>
            </tbody>
        </table>
    </section>

    <!-- Bulk upload modal -->
    <div x-show="openBulk" class="backdrop open" @click="openBulk=''"></div>
    <div x-show="openBulk" class="drawer open" @click.stop>
        <h2 class="text-lg font-semibold mb-4">批量导入 <span class="mono text-base" x-text="openBulk"></span></h2>
        <p class="text-sm text-slate-400 mb-2">格式: <span class="mono">email:pass:recovery:totp</span>（recovery / totp 可选）。重复 email 跳过。</p>
        <textarea x-model="bulkText" rows="12" class="w-full bg-slate-900 p-2 mono text-sm rounded"
                  placeholder="abc@gmail.com:pw1:rec@example.com:TOTP123..."></textarea>
        <div class="mt-3 flex gap-2">
            <button @click="openBulk=''" class="px-3 py-1 bg-slate-700 rounded">取消</button>
            <button @click="submitBulk()" class="px-3 py-1 bg-emerald-700 rounded">上传</button>
        </div>
        <div x-show="bulkResult" class="mt-3 text-sm">
            <pre class="mono text-xs p-2 bg-black/40 rounded" x-text="JSON.stringify(bulkResult, null, 2)"></pre>
        </div>
    </div>

    <!-- Member edit drawer: 手动改 status / host 绑定 -->
    <div x-show="editOpen" class="backdrop open" @click="editOpen=false"></div>
    <div x-show="editOpen" class="drawer open" @click.stop>
        <template x-if="editForm">
            <div class="space-y-4">
                <h2 class="text-lg font-semibold">编辑子号 <span class="mono text-base" x-text="editForm.email"></span></h2>
                <div>
                    <div class="text-sm mb-1">状态</div>
                    <select x-model="editForm.status" class="bg-slate-800 px-2 py-1 rounded w-full">
                        <template x-for="s in ALL_STATUSES" :key="s">
                            <option :value="s" x-text="`${statusLabel(s)} (${s})`"></option>
                        </template>
                    </select>
                </div>
                <div>
                    <div class="text-sm mb-1">绑定母号</div>
                    <select x-model="editForm.host_id" class="bg-slate-800 px-2 py-1 rounded w-full">
                        <option value="">（不绑定）</option>
                        <template x-for="h in hosts" :key="h.id">
                            <option :value="h.id" x-text="`${h.email} (占用 ${h.slot_used}/5${h.disabled ? ', 已停用' : ''})`"></option>
                        </template>
                    </select>
                </div>
                <div class="text-xs text-slate-500 border-t border-slate-700/50 pt-2">
                    说明：手动改 status / host 主要用于修正被流程误判的账号（如 Google 侧已接受但 DB 还是 invite_pending）。每次改动会写一条 manual 事件。
                </div>
                <div class="flex gap-2 pt-2">
                    <button @click="editOpen=false" class="px-3 py-1 bg-slate-700 rounded">取消</button>
                    <button @click="submitEdit()" class="px-3 py-1 bg-emerald-700 rounded">保存</button>
                </div>
            </div>
        </template>
    </div>

    <!-- Member detail drawer -->
    <div x-show="detailOpen" class="backdrop open" @click="detailOpen=false"></div>
    <div x-show="detailOpen" class="drawer open" @click.stop>
        <template x-if="detail">
            <div class="space-y-3">
                <h2 class="text-lg font-semibold mono" x-text="detail.email"></h2>
                <div class="text-sm space-y-1">
                    <div>状态: <span class="pill" :class="detail.status" x-text="statusLabel(detail.status)"></span></div>
                    <div>失败次数：<span x-text="detail.fail_count"></span></div>
                    <div>邀请时间：<span class="mono" x-text="detail.invited_at || '—'"></span></div>
                    <div>加入时间：<span class="mono" x-text="detail.joined_at || '—'"></span></div>
                    <div>完成时间：<span class="mono" x-text="detail.done_at || '—'"></span></div>
                    <div>最后错误：<span class="mono text-red-400" x-text="detail.last_error || '—'"></span></div>
                    <div class="text-xs text-slate-500">当前绑定母号（内部字段）：<span class="mono" x-text="hostEmailById(detail.host_id)"></span></div>
                    <div class="pt-2 border-t border-slate-700/50 mt-2">
                        <div class="text-sm font-semibold mb-1">Antigravity 平台</div>
                        <template x-if="!detail.antigravity || !detail.antigravity.id">
                            <div class="text-xs text-slate-400">未推送</div>
                        </template>
                        <template x-if="detail.antigravity && detail.antigravity.id">
                            <div class="text-xs space-y-1">
                                <div>平台 ID: <span class="mono" x-text="detail.antigravity.id"></span></div>
                                <div>推送时间: <span class="mono" x-text="detail.antigravity.pushed_at || '—'"></span></div>
                                <div>最近同步: <span class="mono" x-text="detail.antigravity.last_synced_at || '—'"></span></div>
                                <div>disabled: <span :class="detail.antigravity.disabled ? 'text-red-400' : ''" x-text="detail.antigravity.disabled ? `是 (${detail.antigravity.disabled_reason || '未知'})` : '否'"></span></div>
                                <div>需验证: <span :class="detail.antigravity.validation_blocked ? 'text-yellow-400' : ''" x-text="detail.antigravity.validation_blocked ? '是' : '否'"></span></div>
                                <div>quota 禁用: <span :class="detail.antigravity.is_forbidden ? 'text-orange-400' : ''" x-text="detail.antigravity.is_forbidden ? `是 (${detail.antigravity.forbidden_reason || '未知'})` : '否'"></span></div>
                            </div>
                        </template>
                        <template x-if="detail.antigravity && detail.antigravity.push_error">
                            <div class="text-xs text-red-400 mt-1">
                                推送错误 [<span x-text="detail.antigravity.push_error.status"></span>]:
                                <span x-text="detail.antigravity.push_error.message"></span>
                                <span class="text-slate-400">(at <span x-text="detail.antigravity.push_error.at"></span>)</span>
                            </div>
                        </template>
                        <div class="flex gap-2 mt-2">
                            <template x-if="detail.token && (!detail.antigravity || !detail.antigravity.id)">
                                <button @click="pushMemberById(detail.id); detailOpen=false" class="px-2 py-1 bg-green-800 hover:bg-green-700 rounded text-xs">推送到平台</button>
                            </template>
                            <template x-if="detail.token && detail.antigravity && detail.antigravity.id">
                                <button @click="pushMemberById(detail.id); detailOpen=false" class="px-2 py-1 bg-green-800 hover:bg-green-700 rounded text-xs">重新推送</button>
                            </template>
                            <template x-if="detail.antigravity && detail.antigravity.id">
                                <button @click="deleteFromPlatform(detail.id); detailOpen=false" class="px-2 py-1 bg-red-900 hover:bg-red-800 rounded text-xs">从平台删除</button>
                            </template>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="text-sm font-semibold mb-1">凭证</div>
                    <textarea readonly class="w-full bg-slate-900 p-2 mono text-xs rounded" rows="3" x-text="detail.token || ''"></textarea>
                </div>
                <div>
                    <div class="text-sm font-semibold mb-1">事件时间线</div>
                    <ul class="text-xs space-y-1 max-h-80 overflow-y-auto">
                        <template x-for="e in detail.events" :key="e.id">
                            <li class="mono">
                                <span x-text="new Date(e.created_at).toLocaleString()"></span>
                                · <span x-text="e.stage || '-'"></span>
                                · <span x-text="e.event_type"></span>
                                · <span class="text-slate-400" x-text="e.message || ''"></span>
                            </li>
                        </template>
                    </ul>
                </div>
                <div class="flex gap-2 pt-2">
                    <button @click="detailOpen=false" class="px-3 py-1 bg-slate-700 rounded">关闭</button>
                </div>
            </div>
        </template>
    </div>
</main>

<script>
function accounts() {
    return {
        tab: 'hosts',
        hosts: [],
        hostMap: {},
        members: [],
        migrate: null,
        hostSearch: '',
        memberSearch: '',
        memberStatusFilter: '',
        openBulk: '',
        bulkText: '',
        bulkResult: null,
        detailOpen: false,
        detail: null,
        editOpen: false,
        editForm: null,
        pendingPushCount: 0,
        archivedCount: 0,
        // { hostId: pid } — non-empty means a manual login Chrome is running; button greys out.
        activeLoginSessions: {},
        _loginSessionsTimer: null,
        ALL_STATUSES: ['new','invite_pending','invite_failed','joined','accept_failed','oauth_failed','join_failed_region','done','abandoned','removed_from_family'],
        ACTIVE_STATUSES: ['new','invite_pending','invite_failed','joined','accept_failed','oauth_failed','join_failed_region','done'],
        ARCHIVED_STATUSES: ['abandoned','removed_from_family'],
        // 每行的密码遮蔽状态：key 为 "host-<id>" / "member-<id>"，布尔值 true 表示已显示。
        revealed: {},
        // TOTP 代码缓存：key 同上，值为 { code, expiresAt(秒) }。
        totpCache: {},
        // 每秒自增一次，用于让 ttlFor() 每秒重新求值（Alpine 依赖此字段变化触发 re-render）。
        tick: 0,
        _totpTimer: null,
        statusLabel(s) {
            return {
                'new': '待处理',
                'invite_pending': '邀请中',
                'invite_failed': '邀请失败',
                'joined': '已加入',
                'accept_failed': '接受失败',
                'oauth_failed': '授权失败',
                'done': '已完成',
                'abandoned': '已放弃',
                'removed_from_family': '已移除',
                'join_failed_region': '加入失败（地区不符）',
            }[s] || s;
        },
        async load() {
            await Promise.all([this.loadHosts(), this.loadMembers(), this.loadMigrate(), this.loadArchivedCount(), this.loadLoginSessions()]);
            // Kick off the TOTP ticker once data is loaded.
            if (!this._totpTimer) {
                this._totpTimer = setInterval(() => {
                    this.tick = (this.tick + 1) % 1_000_000;
                    this.refreshTOTP();
                }, 1000);
                this.refreshTOTP();
            }
            // Poll active login sessions every 3s so the button label flips back
            // from "已登录" to "登录" as soon as the user closes Chrome.
            if (!this._loginSessionsTimer) {
                this._loginSessionsTimer = setInterval(() => this.loadLoginSessions(), 3000);
            }
        },
        async loadLoginSessions() {
            try {
                const rows = await App.api('GET', '/api/hosts/login-sessions');
                const map = {};
                for (const r of rows) map[r.hostId] = r.pid;
                this.activeLoginSessions = map;
            } catch (_) { /* non-critical */ }
        },
        async loginHost(h) {
            try {
                const r = await App.api('POST', `/api/hosts/${h.id}/login`);
                this.activeLoginSessions = { ...this.activeLoginSessions, [h.id]: r.pid };
                alert(`已启动登录（pid ${r.pid}）。Chrome 打开后会自动登入并跳到家庭成员页。关闭浏览器 = 结束会话。`);
            } catch (e) {
                alert('启动登录失败：' + (e.message || e));
            }
        },
        switchTab(t) {
            if (this.tab === t) return;
            this.tab = t;
            // Active / archived tabs use disjoint status filter option sets; reset to avoid stale filter.
            if (t === 'members' || t === 'archived') {
                this.memberStatusFilter = '';
                this.loadMembers();
            }
        },
        async updateStatus(m, newStatus) {
            if (!newStatus || newStatus === m.status) return;
            const previous = m.status;
            try {
                await App.api('PATCH', `/api/members/${m.id}`, { status: newStatus });
                await this.loadMembers();
            } catch (e) {
                alert('状态更新失败：' + e.message);
                m.status = previous;
            }
        },
        async loadArchivedCount() {
            try {
                const s = await App.api('GET', '/api/status');
                const by = s.byStatus || {};
                this.archivedCount = this.ARCHIVED_STATUSES.reduce((sum, k) => sum + (by[k] || 0), 0);
            } catch (_) { /* non-critical */ }
        },
        toggleReveal(kind, id) {
            const key = `${kind}-${id}`;
            this.revealed = { ...this.revealed, [key]: !this.revealed[key] };
        },
        async copyCred(text) {
            if (!text) return;
            const ok = await App.copyText(text);
            if (!ok) alert('复制失败');
        },
        ttlFor(key) {
            // Binding reads `this.tick` so Alpine re-evaluates each second.
            void this.tick;
            const entry = this.totpCache[key];
            if (!entry) return 0;
            const now = Math.floor(Date.now() / 1000);
            return Math.max(0, entry.expiresAt - now);
        },
        async refreshTOTP() {
            if (typeof window.TOTP === 'undefined') return;
            const now = Math.floor(Date.now() / 1000);
            const rows = [
                ...this.hosts.filter(h => h.totp_secret).map(h => ({ key: `host-${h.id}`, secret: h.totp_secret })),
                ...this.members.filter(m => m.totp_secret).map(m => ({ key: `member-${m.id}`, secret: m.totp_secret })),
            ];
            let mutated = false;
            const next = { ...this.totpCache };
            for (const row of rows) {
                const cached = next[row.key];
                if (cached && cached.expiresAt > now) continue;  // still valid
                try {
                    const { code, remainingSeconds } = await window.TOTP.getTOTPWithTTL(row.secret);
                    next[row.key] = { code, expiresAt: now + remainingSeconds };
                    mutated = true;
                } catch (_) {
                    next[row.key] = { code: 'ERR', expiresAt: now + 30 };
                    mutated = true;
                }
            }
            // Evict cache entries for rows that no longer exist to avoid unbounded growth.
            const liveKeys = new Set(rows.map(r => r.key));
            for (const k of Object.keys(next)) {
                if (!liveKeys.has(k)) { delete next[k]; mutated = true; }
            }
            if (mutated) this.totpCache = next;
        },
        async loadHosts() {
            const q = this.hostSearch ? `?search=${encodeURIComponent(this.hostSearch)}` : '';
            this.hosts = await App.api('GET', `/api/hosts${q}`);
            this.hostMap = {};
            for (const h of this.hosts) this.hostMap[h.id] = h.email;
        },
        async loadMembers() {
            const q = new URLSearchParams();
            if (this.memberSearch) q.set('search', this.memberSearch);
            // Tab determines the status-filter baseline: archived tab shows only
            // abandoned/removed_from_family; members tab defaults to the active
            // set (excluding archived). User's per-tab status picker narrows further.
            if (this.tab === 'archived') {
                q.set('status', this.memberStatusFilter || this.ARCHIVED_STATUSES.join(','));
            } else {
                q.set('status', this.memberStatusFilter || this.ACTIVE_STATUSES.join(','));
            }
            const qs = `?${q.toString()}`;
            this.members = await App.api('GET', `/api/members${qs}`);
            this.pendingPushCount = this.members.filter(m =>
                m.status === 'done' && (!m.antigravity || !m.antigravity.id)
            ).length;
            // Keep the "已废弃" tab badge in sync with any mutation that reloads members.
            this.loadArchivedCount();
        },
        async loadMigrate() {
            try { this.migrate = await App.api('GET', '/api/migrate/detect'); }
            catch (_) { this.migrate = null; }
        },
        hostEmailById(id) {
            if (!id) return '—';
            return this.hostMap[id] || `#${id}`;
        },
        async submitBulk() {
            const url = this.openBulk === 'hosts' ? '/api/hosts/bulk' : '/api/members/bulk';
            const targetTab = this.openBulk;
            try {
                const result = await App.api('POST', url, { lines: this.bulkText });
                this.bulkResult = result;
                await (targetTab === 'hosts' ? this.loadHosts() : this.loadMembers());
                const total = (result.inserted || 0) + (result.skipped || 0);
                if (result.parsedZero || total === 0) {
                    alert('没有解析到有效账号，请检查格式（支持：冒号/TAB/---- 分隔，email:密码:找回邮箱:TOTP）');
                } else {
                    alert(`导入成功：新增 ${result.inserted}，跳过重复 ${result.skipped}${(result.errors && result.errors.length) ? `，失败 ${result.errors.length}` : ''}`);
                    this.bulkText = '';
                    this.openBulk = '';   // close drawer on success
                }
            } catch (e) { alert('上传失败：' + e.message); }
        },
        async doImport() {
            try {
                const r = await App.api('POST', '/api/migrate/txt', {});
                alert(`hosts: ${JSON.stringify(r.hosts)}\nmembers: ${JSON.stringify(r.members)}`);
                await this.load();
            } catch (e) { alert(e.message); }
        },
        async toggleDisabled(h) {
            try { await App.api('PATCH', `/api/hosts/${h.id}`, { disabled: !h.disabled }); await this.loadHosts(); }
            catch (e) { alert(e.message); }
        },
        async deleteHost(h) {
            if (!confirm(`确定删除母号 ${h.email}？`)) return;
            try { await App.api('DELETE', `/api/hosts/${h.id}`); await this.loadHosts(); }
            catch (e) { alert(e.message); }
        },
        async openDetail(m) {
            try {
                this.detail = await App.api('GET', `/api/members/${m.id}`);
                this.detailOpen = true;
            } catch (e) { alert(e.message); }
        },
        openEdit(m) {
            this.editForm = {
                id: m.id,
                email: m.email,
                status: m.status,
                host_id: m.host_id == null ? '' : String(m.host_id),
            };
            this.editOpen = true;
        },
        async submitEdit() {
            const f = this.editForm;
            const body = { status: f.status, host_id: f.host_id === '' ? null : parseInt(f.host_id, 10) };
            try {
                await App.api('PATCH', `/api/members/${f.id}`, body);
                this.editOpen = false;
                this.editForm = null;
                await this.loadMembers();
            } catch (e) { alert('保存失败：' + e.message); }
        },
        async copyToken(m) {
            const ok = await App.copyText(m.token);
            alert(ok ? '已复制' : '复制失败');
        },
        async resetMember(m) {
            if (!confirm(`确定重置 ${m.email}？`)) return;
            try { await App.api('PATCH', `/api/members/${m.id}?action=reset`, {}); await this.loadMembers(); }
            catch (e) { alert(e.message); }
        },
        async clearFailCount(m) {
            if (!confirm(`把 ${m.email} 的失败次数 (${m.fail_count}) 清零？状态/母号绑定保持不变。`)) return;
            try {
                await App.api('PATCH', `/api/members/${m.id}?action=clear_fail_count`, {});
                await this.loadMembers();
            } catch (e) { alert('清零失败：' + e.message); }
        },
        async abandonMember(m) {
            if (!confirm(`确定放弃 ${m.email}？`)) return;
            try { await App.api('PATCH', `/api/members/${m.id}?action=abandon`, {}); await this.loadMembers(); }
            catch (e) { alert(e.message); }
        },
        async deleteMember(m) {
            if (!confirm(`确定删除 ${m.email}？`)) return;
            try { await App.api('DELETE', `/api/members/${m.id}`); await this.loadMembers(); }
            catch (e) { alert(e.message); }
        },
        async pushMember(m) {
            if (!confirm(`推送 ${m.email} 到 Antigravity 平台？`)) return;
            try {
                const r = await App.api('POST', `/api/antigravity/push/${m.id}`);
                alert(r.success ? '推送成功' : '推送失败：' + r.error);
                await this.loadMembers();
            } catch (e) { alert('推送失败：' + e.message); }
        },
        async pushAllPending() {
            if (!this.pendingPushCount) { alert('没有待推送的账号'); return; }
            if (!confirm(`批量推送 ${this.pendingPushCount} 个账号到 Antigravity？`)) return;
            try {
                const r = await App.api('POST', '/api/antigravity/push-all');
                alert(`推送完成：成功 ${r.pushed} / 失败 ${r.failed} / 总计 ${r.total}` +
                    (r.failed ? '\n失败详情：\n' + r.errors.map(e => `${e.email}: ${e.error}`).join('\n') : ''));
                await this.loadMembers();
            } catch (e) { alert('批量推送失败：' + e.message); }
        },
        async pushMemberById(id) {
            try {
                const r = await App.api('POST', `/api/antigravity/push/${id}`);
                alert(r.success ? '推送成功' : '推送失败：' + r.error);
                await this.loadMembers();
            } catch (e) { alert('推送失败：' + e.message); }
        },
        async deleteFromPlatform(id) {
            if (!confirm('从 Antigravity 平台删除此账号（本地保留）？')) return;
            try {
                const r = await App.api('DELETE', `/api/antigravity/account/${id}`);
                alert(r.success ? '已从平台删除' : '删除失败：' + r.error);
                await this.loadMembers();
            } catch (e) { alert('删除失败：' + e.message); }
        },
    };
}
</script>
<script src="/public/js/app.js"></script>
<script src="/public/js/totp.js"></script>
