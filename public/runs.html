<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>运行历史 — Gemini Family Pipeline</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="/public/css/app.css">
</head>
<body class="p-6">
<nav class="mb-6 flex gap-3 items-center">
    <span class="text-lg font-semibold">Gemini Family Pipeline</span>
    <div class="flex-1"></div>
    <a href="/" class="px-3 py-1 rounded hover:bg-slate-800">仪表盘</a>
    <a href="/accounts" class="px-3 py-1 rounded hover:bg-slate-800">账号管理</a>
    <a href="/runs" class="px-3 py-1 rounded hover:bg-slate-800 font-medium">运行历史</a>
</nav>

<main x-data="runsPage()" x-init="load(); interval = setInterval(load, 3000)"
      @beforeunload.window="clearInterval(interval)" class="space-y-4">

    <div class="text-xs text-slate-400 mb-2" x-show="me">
        本机 worker: <span class="mono" x-text="(me?.workerLabel || '?') + ' (' + (me?.workerId || '').slice(0, 8) + '…)'"></span>
        — 自家 run 高亮,他人 run 灰显且不可取消。
    </div>
    <table class="data card">
        <thead><tr><th>#</th><th>状态</th><th>阶段</th><th>启动方式</th><th>所属</th><th>开始时间</th><th>耗时</th><th>统计</th><th></th></tr></thead>
        <tbody>
            <template x-for="r in runs" :key="r.id">
                <tr :class="rowClass(r)">
                    <td x-text="r.id"></td>
                    <td><span class="pill" x-text="statusLabel(r.status)"></span></td>
                    <td class="mono" x-text="r.stages"></td>
                    <td class="text-xs" x-text="r.launched_by"></td>
                    <td class="text-xs mono"
                        :title="r.worker_id || '(无 worker_id, 旧数据)'"
                        x-text="ownerLabel(r)"></td>
                    <td class="text-xs" x-text="App.timeago(r.started_at)"></td>
                    <td class="text-xs" x-text="duration(r)"></td>
                    <td class="mono text-xs truncate max-w-xs" x-text="r.stats ? JSON.stringify(r.stats) : '—'"></td>
                    <td><button @click="openRun(r)" class="text-blue-400 text-sm">事件</button></td>
                </tr>
            </template>
        </tbody>
    </table>

    <div x-show="drawerOpen" class="backdrop open" @click="drawerOpen=false"></div>
    <div x-show="drawerOpen" class="drawer open" @click.stop>
        <template x-if="current">
            <div>
                <h2 class="text-lg font-semibold">运行 #<span x-text="current.id"></span></h2>
                <div class="text-sm text-slate-400 mb-2" x-text="current.status + ' · ' + (current.stages || '')"></div>
                <ul class="text-xs space-y-1 max-h-[70vh] overflow-y-auto">
                    <template x-for="e in current.events" :key="e.id">
                        <li class="mono">
                            <span x-text="new Date(e.created_at).toLocaleTimeString()"></span>
                            · <span x-text="e.stage || '-'"></span>
                            · <span x-text="e.event_type"></span>
                            · <span class="text-slate-400" x-text="e.message || ''"></span>
                        </li>
                    </template>
                </ul>
                <button @click="drawerOpen=false" class="mt-3 px-3 py-1 bg-slate-700 rounded">关闭</button>
            </div>
        </template>
    </div>
</main>

<script>
function runsPage() {
    return {
        runs: [], drawerOpen: false, current: null, interval: null, me: null,
        isOwn(r) { return this.me && r.worker_id && r.worker_id === this.me.workerId; },
        rowClass(r) {
            if (r.status !== 'running') return this.isOwn(r) ? '' : 'opacity-60';
            return this.isOwn(r) ? 'bg-blue-950/30' : 'bg-slate-800/40 opacity-70';
        },
        ownerLabel(r) {
            if (!r.worker_id) return '— (旧)';
            if (this.isOwn(r)) return '本机';
            return r.worker_id.slice(0, 8) + '…';
        },
        statusLabel(s) {
            return {
                'new': '待处理',
                'running': '运行中',
                'done': '已完成',
                'failed': '已失败',
                'cancelled': '已取消',
                'invite_pending': '邀请中',
                'invite_failed': '邀请失败',
                'joined': '已加入',
                'accept_failed': '接受失败',
                'oauth_failed': '授权失败',
                'abandoned': '已放弃',
                'removed_from_family': '已移除',
                'join_failed_region': '加入失败（地区不符）',
                'sold': '已出售',
            }[s] || s;
        },
        async load() {
            // me only needs to load once; cache it across the polling interval.
            if (!this.me) {
                try { this.me = await App.api('GET', '/api/me'); } catch (_) { /* non-critical */ }
            }
            try { this.runs = await App.api('GET', '/api/pipeline/runs'); } catch (_) { }
        },
        duration(r) {
            if (!r.started_at) return '—';
            const start = new Date(r.started_at).getTime();
            const end = r.finished_at ? new Date(r.finished_at).getTime() : Date.now();
            const s = Math.floor((end - start) / 1000);
            if (s < 60) return `${s}s`;
            if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
            return `${Math.floor(s/3600)}h ${Math.floor(s%3600/60)}m`;
        },
        async openRun(r) {
            try {
                this.current = await App.api('GET', `/api/pipeline/runs/${r.id}`);
                this.drawerOpen = true;
            } catch (e) { alert(e.message); }
        },
    };
}
</script>
<script src="/public/js/app.js"></script>
</body>
</html>
