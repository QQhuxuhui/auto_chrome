<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Family Pipeline — 仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="/public/css/app.css">
</head>
<body class="p-6">
<nav class="mb-6 flex gap-3 items-center">
    <span class="text-lg font-semibold">Gemini Family Pipeline</span>
    <div class="flex-1"></div>
    <a href="/" class="px-3 py-1 rounded hover:bg-slate-800 font-medium">仪表盘</a>
    <a href="/accounts" class="px-3 py-1 rounded hover:bg-slate-800">账号管理</a>
    <a href="/runs" class="px-3 py-1 rounded hover:bg-slate-800">运行历史</a>
</nav>

<main x-data="dashboard()" x-init="load(); interval = setInterval(load, 3000)"
      @beforeunload.window="clearInterval(interval)" class="space-y-6">

    <section class="card p-4" x-show="status.currentRun">
        <h2 class="text-lg font-semibold mb-2">当前运行</h2>
        <template x-if="status.currentRun">
            <div class="space-y-2">
                <div class="text-sm">
                    #<span x-text="status.currentRun.id"></span>
                    · 阶段 <span x-text="status.currentRun.stages"></span>
                    · pid <span x-text="status.currentRun.pid || '—'"></span>
                    · 开始时间 <span x-text="App.timeago(status.currentRun.started_at)"></span>
                </div>
                <pre class="mono text-xs p-2 bg-black/40 rounded"
                     x-text="JSON.stringify(status.currentRun.stats || {}, null, 2)"></pre>
                <button @click="cancelRun(status.currentRun.id)"
                        class="px-3 py-1 bg-red-900 hover:bg-red-800 rounded text-sm">取消</button>
            </div>
        </template>
    </section>

    <section class="grid grid-cols-3 gap-4">
        <div class="card p-4">
            <h3 class="font-semibold mb-2">子号状态</h3>
            <ul class="text-sm space-y-1">
                <template x-for="s in ['new','invite_pending','joined','done','invite_failed','accept_failed','oauth_failed','abandoned','removed_from_family']" :key="s">
                    <li class="flex justify-between">
                        <span x-text="statusLabel(s)" class="mono"></span>
                        <span x-text="status.byStatus[s] || 0"></span>
                    </li>
                </template>
            </ul>
        </div>
        <div class="card p-4">
            <h3 class="font-semibold mb-2">母号容量</h3>
            <ul class="text-sm space-y-1">
                <li class="flex justify-between"><span>总数</span><span x-text="status.hosts.total"></span></li>
                <li class="flex justify-between"><span>已停用</span><span x-text="status.hosts.disabled"></span></li>
                <li class="flex justify-between"><span>有空位</span><span x-text="status.hosts.withFreeSlot"></span></li>
                <li class="flex justify-between"><span>空位总数</span><span x-text="status.hosts.freeSlotsTotal"></span></li>
            </ul>
        </div>
        <div class="card p-4">
            <h3 class="font-semibold mb-2">Antigravity 平台</h3>
            <ul class="text-sm space-y-1">
                <li class="flex justify-between"><span>平台总账号</span><span x-text="ag.total || 0"></span></li>
                <li class="flex justify-between"><span>disabled</span><span x-text="ag.disabled || 0" class="text-red-400"></span></li>
                <li class="flex justify-between"><span>需验证</span><span x-text="ag.validation_blocked || 0" class="text-yellow-400"></span></li>
                <li class="flex justify-between"><span>quota 禁用</span><span x-text="ag.is_forbidden || 0" class="text-orange-400"></span></li>
                <li class="flex justify-between"><span>未关联本地</span><span x-text="ag.orphans || 0"></span></li>
                <li class="flex justify-between text-xs text-slate-400 pt-1 border-t border-slate-700/50 mt-1">
                    <span>最近同步</span><span x-text="ag.last_sync || '从未'"></span>
                </li>
            </ul>
            <div class="flex gap-2 mt-3">
                <button @click="agSync()" class="px-2 py-1 bg-blue-800 hover:bg-blue-700 rounded text-xs">立即同步</button>
                <button @click="agCleanup()" class="px-2 py-1 bg-orange-800 hover:bg-orange-700 rounded text-xs">执行清理</button>
            </div>
        </div>
    </section>

    <section class="card p-4">
        <button @click="openStartDialog()"
                class="px-4 py-2 bg-emerald-700 hover:bg-emerald-600 rounded font-medium">
            ▶ 启动流程
        </button>
    </section>

    <!-- Start dialog -->
    <div x-show="openStart" class="backdrop open" @click="openStart = false"></div>
    <div x-show="openStart" class="drawer open" @click.stop>
        <h2 class="text-lg font-semibold mb-4">启动流程</h2>
        <div class="space-y-4">
            <div>
                <div class="text-sm mb-1">阶段</div>
                <label class="mr-3"><input type="checkbox" x-model="form.stages1"> 1 发邀请</label>
                <label class="mr-3"><input type="checkbox" x-model="form.stages2"> 2 接受邀请</label>
                <label><input type="checkbox" x-model="form.stages3"> 3 授权</label>
            </div>
            <div>
                <div class="text-sm mb-1 flex items-center gap-2">
                    母号
                    <button type="button" @click="reloadHosts()" class="text-xs text-blue-400 hover:text-blue-300">刷新列表</button>
                </div>
                <label class="block"><input type="radio" name="hm" x-model="form.hostMode" value="auto"> 自动（使用所有有空位的母号）</label>
                <label class="block"><input type="radio" name="hm" x-model="form.hostMode" value="select"> 指定母号（仅被选中的母号进入流程）</label>
                <div x-show="form.hostMode === 'select'" class="ml-4 mt-2 text-sm space-y-1">
                    <div class="flex gap-3 items-center text-xs mb-2">
                        <button type="button" @click="selectAllHosts()" class="text-blue-400 hover:text-blue-300">全选</button>
                        <button type="button" @click="form.selectedHosts = []" class="text-blue-400 hover:text-blue-300">全不选</button>
                        <span class="text-slate-500">已选 <span x-text="form.selectedHosts.length"></span> / <span x-text="hostsList.length"></span></span>
                    </div>
                    <div class="max-h-48 overflow-y-auto border border-slate-700 rounded p-2 space-y-1">
                        <template x-for="h in hostsList" :key="h.id">
                            <label class="block hover:bg-slate-800/50 rounded px-1 py-0.5" :class="(!form.removeUnknown && h.slot_free === 0) ? 'opacity-50' : ''">
                                <input type="checkbox" :value="h.email" x-model="form.selectedHosts" :disabled="!form.removeUnknown && h.slot_free === 0">
                                <span x-text="h.email" class="mono"></span>
                                <span class="text-xs text-slate-400 ml-1" x-text="`(空位 ${h.slot_free}/5)`"></span>
                                <span x-show="h.slot_free === 0 && !form.removeUnknown" class="text-xs text-red-400 ml-1">已满</span>
                                <span x-show="h.slot_free === 0 && form.removeUnknown" class="text-xs text-amber-400 ml-1">已满（reconcile 可能回收空位）</span>
                            </label>
                        </template>
                        <div x-show="!hostsList.length" class="text-slate-500 text-xs py-2 text-center">暂无可用母号，请先去「账号管理」页面添加</div>
                    </div>
                </div>
            </div>
            <div>
                <label class="text-sm">并发数
                    <select x-model.number="form.concurrency" class="ml-2 bg-slate-800 px-2 py-1 rounded">
                        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
                    </select>
                </label>
            </div>
            <div>
                <label class="text-sm">
                    <input type="checkbox" x-model="form.removeUnknown">
                    删除未知家庭成员
                </label>
                <div class="text-xs text-slate-400 ml-5 mt-1">
                    登录 host 后，凡是 Google 家庭里但不在本系统内的成员将被移除（host 自己不会被动）。默认关。
                </div>
            </div>
            <div class="flex gap-2 pt-2">
                <button @click="openStart = false" class="px-3 py-1 bg-slate-700 rounded">取消</button>
                <button @click="submitStart()" class="px-3 py-1 bg-emerald-700 rounded">开始</button>
            </div>
            <div x-show="error" class="text-red-400 text-sm" x-text="error"></div>
        </div>
    </div>
</main>

<script>
function dashboard() {
    return {
        status: { byStatus: {}, hosts: { total: 0, disabled: 0, withFreeSlot: 0, freeSlotsTotal: 0 }, currentRun: null },
        ag: { total: 0, disabled: 0, validation_blocked: 0, is_forbidden: 0, orphans: 0, last_sync: null },
        openStart: false,
        hostsList: [],
        form: { stages1: true, stages2: true, stages3: true, hostMode: 'auto', selectedHosts: [], concurrency: 1, removeUnknown: false },
        error: '',
        interval: null,
        statusLabel(s) {
            return {
                'new': '待处理',
                'invite_pending': '邀请中',
                'invite_failed': '邀请失败',
                'joined': '已加入',
                'accept_failed': '接受失败',
                'oauth_failed': '授权失败',
                'done': '已完成',
                'abandoned': '已放弃',
                'removed_from_family': '已移除',
            }[s] || s;
        },
        async load() {
            try {
                this.status = await App.api('GET', '/api/status');
            } catch (e) { console.error(e); }
            try {
                const s = await App.api('GET', '/api/antigravity/stats');
                this.ag = { ...s, last_sync: this.ag.last_sync };
            } catch (_) { /* platform 不可达时静默跳过 */ }
        },
        async reloadHosts() {
            try {
                this.hostsList = await App.api('GET', '/api/hosts?disabled=0');
            } catch (e) { console.error(e); }
        },
        async openStartDialog() {
            // 重置表单，每次打开都拉最新 hosts 列表
            this.error = '';
            this.form.selectedHosts = [];
            this.form.hostMode = 'auto';
            this.form.removeUnknown = false;
            this.openStart = true;
            await this.reloadHosts();
        },
        selectAllHosts() {
            // 勾了「删除未知家庭成员」时，满员 host 也可选（reconcile 后可能回收空位）
            const pool = this.form.removeUnknown
                ? this.hostsList
                : this.hostsList.filter(h => h.slot_free > 0);
            this.form.selectedHosts = pool.map(h => h.email);
        },
        async submitStart() {
            this.error = '';
            const stages = [];
            if (this.form.stages1) stages.push('1');
            if (this.form.stages2) stages.push('2');
            if (this.form.stages3) stages.push('3');
            if (!stages.length) { this.error = '请至少选择一个阶段'; return; }
            if (this.form.hostMode === 'select' && !this.form.selectedHosts.length) {
                this.error = '请至少选择一个母号（或切换为「自动」模式）';
                return;
            }
            const hostFilter = this.form.hostMode === 'select' ? this.form.selectedHosts : [];
            try {
                await App.api('POST', '/api/pipeline/start', {
                    stages: stages.join(','),
                    hostFilter,
                    concurrency: this.form.concurrency,
                    removeUnknownMembers: this.form.removeUnknown,
                });
                this.openStart = false;
                this.load();
            } catch (e) { this.error = e.message; }
        },
        async cancelRun(id) {
            if (!confirm(`确定取消运行 #${id}？`)) return;
            try {
                await App.api('POST', `/api/pipeline/runs/${id}/cancel`);
                this.load();
            } catch (e) { alert(e.message); }
        },
        async agSync() {
            try {
                const r = await App.api('POST', '/api/antigravity/sync');
                this.ag.last_sync = new Date().toLocaleTimeString();
                alert(`同步完成：匹配 ${r.matched}，新 disabled ${r.newly_disabled.length}，orphan ${r.orphans.length}`);
                this.load();
            } catch (e) { alert('同步失败：' + e.message); }
        },
        async agCleanup() {
            if (!confirm('执行清理会登录 host、扫描 family 页并移除 disabled 成员。确认？')) return;
            try {
                const r = await App.api('POST', '/api/reconcile');
                alert(`清理流程已启动（run #${r.runId}）。打开运行历史看进度。`);
                this.load();
            } catch (e) { alert('启动清理失败：' + e.message); }
        },
    };
}
</script>
<script src="/public/js/app.js"></script>
</body>
</html>
